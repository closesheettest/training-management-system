<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products — U.S. Shingle &amp; Metal Retail Training</title>
<!--
  PRODUCTS deck. What we sell — asphalt shingle (GAF / Tamko Titan), exposed-
  fastener metal (Ultra Rib, PBR), standing seam (TCM Lok), stone-coated, and
  Permalock. Slides are the rendered pages of the original Products Google
  Slides (with the product photos), shown full-bleed.
-->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.0.4/dist/reset.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.0.4/dist/reveal.css">
<style>
  :root{ --navy:#0a1730; }
  html,body{background:var(--navy);}
  .reveal .backgrounds{background:var(--navy);}
  .reveal .slides{text-align:center;}
  .reveal section{height:100%;display:flex;align-items:center;justify-content:center;}
  .reveal .slides img.slide-img{
    margin:0;border:0;box-shadow:0 8px 40px rgba(0,0,0,.5);border-radius:6px;
    max-height:94vh;max-width:96vw;width:auto;height:auto;background:var(--navy);
  }
  .corner{position:fixed;bottom:12px;right:16px;font-family:system-ui,sans-serif;font-size:.62rem;letter-spacing:.2em;color:#3a4a66;text-transform:uppercase;z-index:30;}
</style>
</head>
<body>
<div class="reveal"><div class="slides">
  <section><img class="slide-img" src="img/slide-01.png" alt="Products — title"></section>
  <section><img class="slide-img" src="img/slide-02.png" alt="Roofing pitch"></section>
  <section><img class="slide-img" src="img/slide-03.png" alt="Asphalt Shingle — GAF / Tamko Titan"></section>
  <section><img class="slide-img" src="img/slide-04.png" alt="Exposed Fastener Metal — overview"></section>
  <section><img class="slide-img" src="img/slide-05.png" alt="Exposed Fastener Metal — Ultra Rib Panel (2/12)"></section>
  <section><img class="slide-img" src="img/slide-06.png" alt="Exposed Fastener Metal — PBR (.5/12)"></section>
  <section><img class="slide-img" src="img/slide-07.png" alt="Exposed Fastener Metal — panels"></section>
  <section><img class="slide-img" src="img/slide-08.png" alt="Standing Seam Metal — overview"></section>
  <section><img class="slide-img" src="img/slide-09.png" alt="Standing Seam — TCM Lok (.25/12)"></section>
  <section><img class="slide-img" src="img/slide-10.png" alt="Stone Coated Metal — CF Shake / Antica"></section>
  <section><img class="slide-img" src="img/slide-11.png" alt="Permalock — lifetime, 185mph"></section>
</div></div>
<div class="corner">Products</div>

<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.0.4/dist/reveal.js"></script>
<script>
  Reveal.initialize({ hash:true, transition:'slide', backgroundTransition:'fade', controls:true, progress:true, slideNumber:'c/t', width:1280, height:720, margin:0 });
</script>
</body>
</html>
