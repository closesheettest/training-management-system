[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Scheduled function: nightly homework SMS for every active training
# class. Fires at 23:00 UTC = 7 PM EDT / 6 PM EST. The function file
# also declares this via export config.schedule; this toml entry keeps
# the cadence visible from project root.
[functions."cron-training-homework"]
  schedule = "0 23 * * *"

# Scheduled function: no-show / dropout detection. Fires every 30 min
# from 14:00 to 22:30 UTC. The function self-gates to the 10:30 AM –
# 5:30 PM ET training-day window (handles DST automatically). First
# fire that actually does work is 10:30 AM ET (30 min after the 10 AM
# class start = grace period). Then re-checks every 30 min until end
# of training day so late attendance corrections get reconciled and
# no one slips through.
[functions."notify-trainee-dropout"]
  schedule = "*/30 14-22 * * *"

# SPA routing: any path that's not a real file goes to index.html
# so React Router can handle it (otherwise /register/:token would 404 on a hard refresh).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
