[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Scheduled function: homework SMS for every active training class, sent
# right at each day's dismissal. Fires at 18:00, 19:00, 20:00 UTC (= 2:00,
# 3:00, 4:00 PM EDT); the function self-gates each class to the fire that
# matches its dismissal time. MUST stay in sync with export config.schedule
# in the function file — Netlify uses THIS toml value, so a mismatch here
# silently overrides the code. DST: bump to "0 19,20,21 * * *" during EST.
[functions."cron-training-homework"]
  schedule = "0 18,19,20 * * *"

# Scheduled function: no-show / dropout detection. Fires every 30 min
# from 14:00 to 22:30 UTC. The function self-gates to the 10:30 AM –
# 5:30 PM ET training-day window (handles DST automatically). First
# fire that actually does work is 10:30 AM ET (30 min after the 10 AM
# class start = grace period). Then re-checks every 30 min until end
# of training day so late attendance corrections get reconciled and
# no one slips through.
[functions."notify-trainee-dropout"]
  schedule = "*/30 14-22 * * *"

# Scheduled function: pull rep SMS replies out of GoHighLevel into
# rep_messages so the regional-manager Team Replies inbox can show them.
# Every minute — replies surface within ~1 min. We poll because GHL's push
# (Workflow webhook) wasn't usable on this account; see the function header.
# MUST stay in sync with export config.schedule in the function file —
# Netlify reads THIS value.
[functions."cron-poll-rep-replies"]
  schedule = "* * * * *"

# SPA routing: any path that's not a real file goes to index.html
# so React Router can handle it (otherwise /register/:token would 404 on a hard refresh).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
